  /webapi/v1/invoices:
    description: Returns a paginated list of invoices.
    get:
      tags:
        - Invoices
      description: Returns the list of invoices
      operationId: getAllInvoices              
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  lnks:
                    type: object
                    required:
                      - prev
                      - next
                    properties:
                      prev:
                        type: string
                        description: Represents the URL for the previous page of this request
                        example: https://.../v1/albums/2sds6  
                      next:
                        type: string
                        description: Represents the URL for the next page of this request
                        example: https://.../v1/albums/2sDs6  
                  data:       
                    type: array
                    items:
                      type: object
                      required:
                        - InvoiceId        
                        - CustomerId       
                        - InvoiceDate      
                        - Total 
                      properties:
                        InvoiceId:
                          type: integer
                          format: int64
                          minimum: 1
                          example: 1
                        CustomerId:
                          type: integer
                          format: int64
                          minimum: 1
                          example: 1
                        InvoiceDate:
                          type: string
                          format: date-time
                          example: "2019-10-12T07:20:50.52Z"
                          description: ISO 8601 Combined Date and Time
                        Total:
                          type: number
                          format: double
                          minimum: 0.0
                          example: 3.26
        '400':
          "$ref": "#/components/responses/_400"                          
        '401':
          "$ref": "#/components/responses/_401"
        '500':
          "$ref": "#/components/responses/_500"           
        '503':
          "$ref": "#/components/responses/_503"                         
  /webapi/v1/invoices/{InvoiceId}:
    description: Returns a detailed invoice by its id.
    get:
      tags:
        - Invoices
      description: Returns an invoice
      operationId: getInvoiceById             
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                required:
                  - InvoiceId        
                  - CustomerId       
                  - InvoiceDate      
                  - BillingAddress   
                  - BillingCity      
                  - BillingState     
                  - BillingCountry   
