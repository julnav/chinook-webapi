components:
  responses: 
    _400:              
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              probable_culprit:
                type: array
                items:
                  type: string
                  enum:
                    - Malformed Syntax
                    - Missing Required Data
                    - Invalid Data Types or Values
                    - Encoding Issues
                    - Invalid Page
                description: List of possible causes for the error
                example: ["Malformed Syntax", "Missing Required Data"]    
    _401:
      description: Unauthorized 
      content:
        application/json:
          schema:
            type: object
            required:
              - error
              - message
            properties:
              error:
                type: string
                maxLength: 60
                example: "Unauthorized"
              message:
                type: string
                maxLength: 90
                example: "Missing or invalid token."
      headers:      
        WWW-Authenticate:
          description: Required authentication message
          schema:
            type: string
            example: "WWW-Authenticate: Bearer realm='Access to admin site', error='Required authentication'"
    _404:              
      description: Not found 
      content:
        application/json:
          schema:
            type: object
            required:
              - error
              - message
            properties:
              error:
                type: string
                maxLength: 60
                example: "Not found"
              message:
                type: string
                maxLength: 90
                example: "The requested resource, {user} with ID {123}, could not be found on this server."
    _409:              
      description: Conflict
      content:
        application/json:
          schema:
            type: object
            required:
              - error
              - message
              - conflicting_field
            properties:
              error:
                type: string
                maxLength: 82
                example: Email error
              message:
                type: string
                maxLength: 82
                example: This email is already been used in this server
              conflicting_field:
                type: string
                maxLength: 82
                example: "email: {moraz12@gmail.com}"
    _500:
      description: Generic 
      content:
        application/json:
          schema:
            type: object
            required:
              - error
              - message
            properties:
              error:
                type: string
                maxLength: 60
                example: "Unexpected error"
              message:
                type: string
                maxLength: 90
                example: "Try again later"               
    _503:
      description: Service Unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                maxLength: 90
                example: "We're currently upgrading our systems."
              starts:
                type: string
                format: date-time
                example: "2019-10-12T07:20:50.52Z"
                description: ISO 8601 Combined Date and Time
              ends:
                type: string
                format: date-time
                example: "2019-10-12T07:20:50.52Z"
                description: ISO 8601 Combined Date and Time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token
      bearerFormat: 32 character self produced (webapi) string

