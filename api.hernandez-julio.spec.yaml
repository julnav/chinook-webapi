openapi: 3.1.0
info:
  title: Chinook Webapi
  summary: RESTful API for the Chinook database
  description: Sale of tracks
  termsOfService: https://api.hernandez-julio.com/webapi/termsofservice
  version: v1
  contact:
    name: Administrator
    email: admin@api.hernandez-julio.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0 
servers:
  - url: https://api.hernandez-julio.com
    description: Production set
security:
  - bearerAuth: []   
tags :
  - name: Me
    description: Current user info
  - name: Albums
    description: Manages albums
  - name: Employees
    description: Manages employees
  - name: Invoices
    description: Manages invoices
  - name: Tracks
    description: Manages tracks
  - name: Customers
    description: Manages customers
  - name: Sales
    description: Manages sales                      
paths:
  /webapi/v1/me:
    description: Returns info about the current user.
    get:
      tags:
        - Me 
      description: Returns the current user description
      operationId: getCurrentUser                
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                required:
                  - username
                  - email
                  - status
                  - receive_offer
                  - public_key  
                  - created_at
                  - expìres_at
                  - last_checked 
                properties:
                  username:
                    type: string
                    minLength: 2
                    maxLength: 16
                    example: Mary 
                  email:
                    type: string
                    maxLength: 60
                    example: something@fake.com
                  status:
                    type: string
                    enum: 
                      - Active
                      - Suspended 
                      - Deleted
                    default: Active
                  receive_offer:
                    type: integer
                    minimum: 0
                    maximum: 1
                    example: 0
                  public_key :
                    type: string
                    description: 32 character long string
                    example: "fs6fd84g.."
                  created_at:
                    type: string
                    format: date-time
                    example: "2019-10-12T07:20:50.52Z"
                    description: ISO 8601 Combined Date and Time
                  expires_at:
                    type: string
                    format: date-time
                    example: "2019-10-12T07:20:50.52Z"
                    description: ISO 8601 Combined Date and Time
                  last_checked:
                    type: string
                    format: date-time
                    example: "2019-10-12T07:20:50.52Z"
                    description: ISO 8601 Combined Date and Time
        '401':
          "$ref": "#/components/responses/_401"
        '500':
          "$ref": "#/components/responses/_500"           
        '503':
          "$ref": "#/components/responses/_503"                    
  /webapi/v1/albums:
    description: The get method returns a paginated list of albums, the post method adds a new album to the database.
    get:
      tags:
        - Albums 
      description: Returns the list of albums
      operationId: getAllAlbums               
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  lnks:
                    type: object
                    required:
                      - prev
                      - next
                    properties:
                      prev:
                        type: string
                        description: Represents the URL for the previous page of this request
                        example: https://.../v1/albums/2sds6  
                      next:
                        type: string
                        description: Represents the URL for the next page of this request
                        example: https://.../v1/albums/2sDs6  
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - AlbumId
                      - Title
                      - ArtistId
                    properties:
                      AlbumId:
                        type: integer
                        format: int64
                        minimum: 1
                        example: 1
                      Title:
                        type: string
                        maxLength: 160
                        example: "Apple"
                      ArtistId:
                        type: integer
                        format: int64
                        minimum: 1
                        example: 1
        '400':
          "$ref": "#/components/responses/_400"                         
        '401':
          "$ref": "#/components/responses/_401"
        '500':
          "$ref": "#/components/responses/_500"           
        '503':
          "$ref": "#/components/responses/_503"         
    post:
      tags:
        - Albums 
      description: Create a new album
      operationId: addNewAlbum
      requestBody:
        description: album to add to the system
        required: true
        content:
          'application/json':
            schema:
              type: object
              required:
                - Title
                - ArtistId
              properties:
                Title:
                  type: string
                  maxLength: 160
                  example: "Apple"
                ArtistId:
                  type: integer
                  format: int64
                  minimum: 1
                  example: 1
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: The unique location for the new album.
              schema:
                type: string
                example: "https://api.hernandez-julio.com/webapi/v1/albums/{AlbumId}"
          content:
            application/json:
              schema:
                type: object
                required:
                  - AlbumId
                  - Title
                  - ArtistId
                properties:
                  AlbumId:
                    type: integer
                    format: int64
                    minimum: 1
                    example: 1
                  Title:
                    type: string
                    maxLength: 160
                    example: "Apple"
                  ArtistId:
                    type: integer
                    format: int64
                    minimum: 1
                    example: 1
        '400':
          "$ref": "#/components/responses/_400"           
        '401':
          "$ref": "#/components/responses/_401"
        '500':
          "$ref": "#/components/responses/_500"          
        '503':
          "$ref": "#/components/responses/_503"                               
  /webapi/v1/albums/{AlbumId}:
    description: This endpoint updates and deletes albums by Id.
    put:
      tags:
        - Albums
      description: Updates an album
      operationId: updateAlbum
      requestBody:
        description: album to update
        required: true
        content:
          'application/json':
            schema:
              type: object
              properties:
                Title:
                  type: string
                  maxLength: 160
                  example: "Apple"
                ArtistId:
                  type: integer
                  format: int64
                  minimum: 1
                  example: 1
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                required:
                - AlbumId
                - Title
                - ArtistId
                properties:
                  AlbumId:
                    type: integer
                    format: int64
                    minimum: 1
                    example: 1
                  Title:
                    type: string
                    maxLength: 160
                    example: "Apple"
                  ArtistId:
                    type: integer
                    format: int64
                    minimum: 1
                    example: 1
        '400':
          "$ref": "#/components/responses/_400"                     
        '401':
          "$ref": "#/components/responses/_401"                    
        '404':
          "$ref": "#/components/responses/_404"
        '500':
          "$ref": "#/components/responses/_500"                               
        '503':
          "$ref": "#/components/responses/_503"                     
    delete:
      tags:
        - Albums 
      description: Delete an album
      operationId: deleteAlbum
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                required:
                  - DeletedAlbumId
                properties:
                  DeletedAlbumId:
                    type: integer
                    minimum: 1
                    example: 1
        '400':
          "$ref": "#/components/responses/_400"                    
        '401':
          "$ref": "#/components/responses/_401"
        '404':
          "$ref": "#/components/responses/_404"
        '500':
          "$ref": "#/components/responses/_500"                       
        '503':
          "$ref": "#/components/responses/_503"                                     
    parameters:      
    - name: AlbumId
      in: path
      description: Numeric ID of the album to update
      required: true
      schema:
        type: integer
        format: int64        
        minimum: 1
        example: 1              
  /webapi/v1/albums/search:
    description: Returns a paginated list of albums from a search result.
    get:
      tags:
        - Albums 
      description: Returns the list of albums found
      operationId: searchAlbum            
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  lnks:
                    type: object
                    required:
                      - prev
                      - next
                    properties:
                      prev:
                        type: string
                        description: Represents the URL for the previous page of this request
                        example: https://.../v1/albums/2sds6  
                      next:
                        type: string
                        description: Represents the URL for the next page of this request
                        example: https://.../v1/albums/2sDs6 
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - AlbumId
                      - Title
                      - ArtistId
                      properties:
                        AlbumId:
                          type: integer
                          format: int64
                          minimum: 1
                          example: 1
                        Title:
                          type: string
                          maxLength: 160
                          example: "Apple"
                        ArtistId:
                          type: integer
                          format: int64
                          minimum: 1
                          example: 1
        '400':
          "$ref": "#/components/responses/_400" 
        '401':
          "$ref": "#/components/responses/_401"
        '500':
          "$ref": "#/components/responses/_500"                       
        '503':
          "$ref": "#/components/responses/_503"                           
    parameters:       
    - name: searchTerm
      in: query
      description: search term string
      required: true
      schema:
        type: string
        minLength: 4
        maxLength: 16
    - name: page
      in: query
      description: Page number for pagination, base64url encoded
      required: false
      schema:
        type: string    
